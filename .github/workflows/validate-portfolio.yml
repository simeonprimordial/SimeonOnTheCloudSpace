name: Validate portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [redesign/clean-professional-portfolio]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
